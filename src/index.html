<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <app-root></app-root>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
          <script src="assets/js/jquery-3.2.1.min.js"></script>
		
	
	<!-- jQuery (must be loaded first) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Slimscroll JS -->
<script src="src/assets/plugins/slimscroll/jquery.slimscroll.min.js"></script>

<script>
  $(document).ready(function () {
    // Apply slimscroll to sidebar-inner
    $('.sidebar-inner').slimScroll({
      height: '100%', // full height
      color: '#aaa', // scrollbar color
      size: '5px', // scrollbar width
    });
  });
</script>

<!-- Raphael & Morris JS -->
<script src="assets/plugins/raphael/raphael.min.js"></script>
<script src="assets/plugins/morris/morris.min.js"></script>
<script src="assets/js/chart.morris.js"></script>

<!-- CSS fix -->
<style>
  .sidebar {
    height: 100vh; /* full viewport height */
    overflow: hidden; /* let slimscroll handle scrolling */
  }
</style>

</body>
</html>
